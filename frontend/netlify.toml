[build]
  command = "CI=false npm run build"
  publish = "build"

# Handle API redirects and add CORS headers
[[redirects]]
  from = "/api/*"
  to = "https://schmovies.up.railway.app/api/:splat"
  status = 200
  force = true
  headers = {Access-Control-Allow-Origin = "*"}

[[redirects]]
  from = "/quiz/*"
  to = "https://schmovies.up.railway.app/quiz/:splat"
  status = 200
  force = true
  headers = {Access-Control-Allow-Origin = "*"}

# Handle OPTIONS requests for CORS preflight
[[redirects]]
  from = "/api/*"
  to = "https://schmovies.up.railway.app/api/:splat"
  status = 200
  force = true
  methods = ["OPTIONS"]
  headers = {Access-Control-Allow-Origin = "*", Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS", Access-Control-Allow-Headers = "Origin, X-Requested-With, Content-Type, Accept, Authorization"}

[[redirects]]
  from = "/quiz/*"
  to = "https://schmovies.up.railway.app/quiz/:splat"
  status = 200
  force = true
  methods = ["OPTIONS"]
  headers = {Access-Control-Allow-Origin = "*", Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS", Access-Control-Allow-Headers = "Origin, X-Requested-With, Content-Type, Accept, Authorization"}

# This redirect ensures that all routes serve the index.html 
# (single page app behavior)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200